<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TFD Aviso+ | Gestão de Notificações</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>TFD Aviso+ <span>Içara/SC</span></h1>
        <p>Prioridade máxima: Paciente notificado e consulta garantida.</p>
    </header>

    <main class="container">
        <section class="card">
            <h2>Cadastrar Novo Agendamento</h2>
            <form id="form-paciente">
                <input type="text" id="nome" placeholder="Nome do Paciente" required>
                <input type="tel" id="telefone" placeholder="Telefone (WhatsApp)" required>
                <input type="text" id="procedimento" placeholder="Exame/Consulta" required>
                <select id="cidade">
                    <option value="Criciúma">Criciúma</option>
                    <option value="Florianópolis">Florianópolis</option>
                    <option value="Outra">Outra Cidade</option>
                </select>
                <button type="submit">Adicionar à Lista</button>
            </form>
        </section>

        <section class="card">
            <h2>Pacientes Aguardando Notificação</h2>
            <table id="tabela-pacientes">
                <thead>
                    <tr>
                        <th>Paciente</th>
                        <th>Procedimento</th>
                        <th>Status</th>
                        <th>Ação</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
